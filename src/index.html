<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>源计划 - 一二布布主题待办清单</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar: Calendar + Clock + GIF -->
    <aside class="sidebar" id="sidebar">
      <div class="calendar-header">
        <button class="calendar-nav-btn" id="cal-prev">◀</button>
        <span class="calendar-month-label" id="cal-month-label">2026年7月</span>
        <button class="calendar-nav-btn" id="cal-next">▶</button>
      </div>
      <div class="calendar-weekdays">
        <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
      <div class="clock-widget">
        <div class="clock-time" id="clock-time">00:00</div>
        <div class="clock-date" id="clock-date">2026年7月16日</div>
      </div>
      <div class="gif-area" id="gif-area">
        <img id="gif-img" src="" alt="一二布布">
      </div>
      <div class="sidebar-footer-actions">
        <button id="btn-settings">⚙️ 设置</button>
        <button id="btn-stats">📊 统计</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Day Navigation -->
      <div class="day-nav">
        <button class="day-nav-btn" id="day-prev">◀</button>
        <span class="day-nav-label" id="day-label">今天</span>
        <button class="day-nav-btn" id="day-next">▶</button>
        <button class="day-nav-today" id="day-today">今天</button>
      </div>

      <!-- Add Task -->
      <div class="add-task-area">
        <div class="add-task-row">
          <input type="text" class="add-task-input" id="add-task-title" placeholder="✨ 添加新任务...">
          <button class="btn-add" id="btn-add">添加</button>
        </div>
        <div class="add-task-extra" id="add-task-extra" style="display:none;">
          <select id="add-category">
            <option value="work">💼 办公</option>
            <option value="life">🏠 生活</option>
            <option value="sport">🏃 运动</option>
            <option value="diet">🍽️ 饮食</option>
          </select>
          <select id="add-priority">
            <option value="medium">🟡 普通</option>
            <option value="high">🔴 紧急</option>
            <option value="low">🟢 不急</option>
          </select>
          <input type="date" id="add-date">
          <input type="number" id="add-progress" placeholder="进度%" min="0" max="100" style="width:70px;">
        </div>
      </div>

      <!-- Search & Filter -->
      <div class="search-area">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="模糊搜索任务...">
        </div>
        <select class="filter-select" id="filter-status">
          <option value="all">全部</option>
          <option value="active">进行中</option>
          <option value="completed">已完成</option>
        </select>
        <select class="filter-select" id="filter-category">
          <option value="all">所有分类</option>
        </select>
      </div>

      <!-- Task List -->
      <div class="task-list-container" id="task-list">
        <div class="empty-state" id="empty-state">
          <svg viewBox="0 0 100 100" width="100" height="100">
            <circle cx="30" cy="40" r="12" fill="#FDE8E8"/>
            <circle cx="70" cy="40" r="14" fill="#F5E6D8"/>
            <ellipse cx="50" cy="60" rx="30" ry="18" fill="#FFF0E8"/>
            <circle cx="38" cy="35" r="2" fill="#5D4037"/>
            <circle cx="66" cy="35" r="2" fill="#5D4037"/>
            <path d="M40 50 Q50 58 60 50" fill="none" stroke="#5D4037" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <div class="empty-title">今天还没有计划哦~</div>
          <div class="empty-desc">点击上方添加新任务吧 💕</div>
        </div>
      </div>
    </main>

    <!-- Detail Panel -->
    <aside class="detail-panel hidden" id="detail-panel">
      <div class="detail-panel-header">
        <span class="detail-panel-title">任务详情</span>
        <button class="btn btn-ghost btn-icon" id="detail-close">✕</button>
      </div>
      <div class="detail-panel-body" id="detail-panel-body"></div>
    </aside>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="../node_modules/chart.js/dist/chart.umd.min.js"></script>
  <script src="js/store.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/clock.js"></script>
  <script src="js/gif-rotator.js"></script>
  <script src="js/search.js"></script>
  <script src="js/task-list.js"></script>
  <script src="js/task-detail.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => { window.App.init(); });
  </script>
</body>
</html>
