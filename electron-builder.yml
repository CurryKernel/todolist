appId: com.yuanplan.todolist
productName: 源计划
executableName: YuanPlan
directories:
  output: dist
files:
  - main.js
  - preload.js
  - src/**/*
  - node_modules/**/*
win:
  target:
    - target: nsis
    - target: portable
  signAndEditExecutable: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 源计划
